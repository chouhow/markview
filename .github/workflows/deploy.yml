name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/markview
            # 使用 SSH over 443 端口连接 GitHub，绕过防火墙对 22 端口的封锁
            git remote set-url origin ssh://git@ssh.github.com:443/chouhow/markview.git
            # 使用 deploy_key 进行 SSH 认证拉取代码
            GIT_SSH_COMMAND='ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new' git pull origin main
            docker compose up -d --build
            docker ps
